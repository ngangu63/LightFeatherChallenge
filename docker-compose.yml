services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      VITE_BACKEND_URL: http://backend:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
